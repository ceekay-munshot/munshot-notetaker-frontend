name = "munshot-notetaker-frontend"
main = "worker/index.js"
compatibility_date = "2024-11-01"

# The React dashboard is built to ./dist (`npm run build`) and served as static
# assets. The Worker runs first for every request: it handles /api/* itself and
# serves the SPA (index.html + hashed assets) for everything else via the
# ASSETS binding. Nothing is gated at the asset layer — all data is behind the
# authenticated /api/* routes, and the SPA renders the login screen until
# /api/me succeeds.
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# Cron trigger: runs the scheduled-meeting runner every minute so the notetaker
# joins on time whether or not anyone has the dashboard open. 1 minute is the
# finest Cloudflare granularity, so scheduled times are honoured to the minute.
[triggers]
crons = ["* * * * *"]

# The munshot bot endpoints. Override here if the tunnel changes.
[vars]
JOIN_ENDPOINT = "https://mortgage-competitive-angels-anonymous.trycloudflare.com/public/join"
LEAVE_ENDPOINT = "https://mortgage-competitive-angels-anonymous.trycloudflare.com/public/leave"

# KV namespace for users + sessions (namespace: meetbot-users).
[[kv_namespaces]]
binding = "KV"
id = "759a21557c7d4e118296479f9b4c50a6"

# Secrets are NOT stored in this file. With git-connected Workers Builds,
# add them once in the dashboard — they persist across deploys:
#   Worker → Settings → Variables and Secrets → Add → type "Secret"
#     API_KEY      (required)  the X-API-Key value
#     SIGNUP_CODE  (optional)  require a code to register

# Transcripts database (D1).
[[d1_databases]]
binding = "DB"
database_name = "vexa-transcript"
database_id = "d43cc292-3389-42ba-bd20-184ac4335360"
