name = "munshot-notetaker-frontend"
main = "src/index.js"
compatibility_date = "2024-11-01"

# The munshot bot endpoints. Override here if the tunnel changes.
[vars]
JOIN_ENDPOINT = "https://amy-recruitment-blair-vinyl.trycloudflare.com/public/join"
LEAVE_ENDPOINT = "https://amy-recruitment-blair-vinyl.trycloudflare.com/public/leave"

# KV namespace for users + sessions (namespace: meetbot-users).
[[kv_namespaces]]
binding = "KV"
id = "759a21557c7d4e118296479f9b4c50a6"

# Secrets are NOT stored in this file. With git-connected Workers Builds,
# add them once in the dashboard — they persist across deploys:
#   Worker → Settings → Variables and Secrets → Add → type "Secret"
#     API_KEY      (required)  the X-API-Key value
#     SIGNUP_CODE  (optional)  require a code to register

# Transcripts database (D1).
[[d1_databases]]
binding = "DB"
database_name = "vexa-transcript"
database_id = "d43cc292-3389-42ba-bd20-184ac4335360"
