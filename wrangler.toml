name = "munshot-notetaker-frontend"
main = "worker/index.js"
compatibility_date = "2024-11-01"

# Build the React SPA into ./dist before any deploy/upload. Workers Builds (CI)
# runs `wrangler versions upload` directly, so this hook is what produces the
# assets the [assets] block below serves. Runs locally on `wrangler deploy` too.
[build]
command = "npm run build"

# The React dashboard is built to ./dist (`npm run build`) and served as static
# assets. A request that matches a built file (hashed JS/CSS, fonts, the logo)
# is served directly; everything else invokes the Worker, which handles /api/*
# and otherwise serves the SPA shell (index.html) via the ASSETS binding so
# client-side routes load. Nothing is gated at the asset layer — all data is
# behind the authenticated /api/* routes, and the SPA shows the login screen
# until /api/me succeeds. (No not_found_handling = "single-page-application":
# that would shadow /api/* with index.html; the Worker does the SPA fallback.)
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
# Serve files literally — don't let the asset layer redirect "/index.html" → "/"
# (its default), which would loop against the Worker's SPA fallback.
html_handling = "none"

# Cron trigger: runs the scheduled-meeting runner every minute so the notetaker
# joins on time whether or not anyone has the dashboard open. 1 minute is the
# finest Cloudflare granularity, so scheduled times are honoured to the minute.
[triggers]
crons = ["* * * * *"]

# The munshot bot endpoints. Override here if the tunnel changes.
[vars]
JOIN_ENDPOINT = "http://65.1.101.15.nip.io:8080/public/join"
LEAVE_ENDPOINT = "http://65.1.101.15.nip.io:8080/public/leave"

# KV namespace for users + sessions (namespace: meetbot-users).
[[kv_namespaces]]
binding = "KV"
id = "759a21557c7d4e118296479f9b4c50a6"

# Secrets are NOT stored in this file. With git-connected Workers Builds,
# add them once in the dashboard — they persist across deploys:
#   Worker → Settings → Variables and Secrets → Add → type "Secret"
#     API_KEY      (required)  the X-API-Key value
#     SIGNUP_CODE  (optional)  require a code to register
#     MUNS_TOKEN   (required for password reset)  bearer token for the Muns
#                  raw email API (POST https://devde.muns.io/email/send/raw)

# Transcripts database (D1).
[[d1_databases]]
binding = "DB"
database_name = "vexa-transcript"
database_id = "d43cc292-3389-42ba-bd20-184ac4335360"
